name: cloudnext_fleet_driver
description: CloudNext Fleet Driver & Supervisor App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # State management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2

  # QR
  mobile_scanner: ^5.2.2
  qr_flutter: ^4.1.0

  # Maps (Flutter map - no API key needed)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location/GPS
  geolocator: ^13.0.1

  # Icons
  flutter_svg: ^2.0.9

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
